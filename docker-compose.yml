version: '3.8'
services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: tailor_saas_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
       bondage
      - ./init:/docker-entrypoint-initdb.d
volumes:
  db_data: